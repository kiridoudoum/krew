<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion / Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script>
        if (localStorage.getItem('isAuthenticated') === 'true') {
            window.location.href = 'app.html';
        }
    </script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-container">
                <img src="img/logo.png" alt="krew+" class="logo-img">
            </div>

            <h2 id="form-subtitle" class="subtitle">connexion</h2>

            <form id="auth-form" class="login-mode">
                <div class="form-layout">

                    <div class="input-container register-only" id="nom-container">
                        <label class="floating-label label-peach">nom</label>
                        <input type="text" id="nom" class="outline-input" placeholder="dupond">
                    </div>

                    <div class="input-container register-only" id="prenom-container">
                        <label class="floating-label label-yellow">prénom</label>
                        <input type="text" id="prenom" class="outline-input" placeholder="blabla">
                    </div>

                    <div class="input-container register-only" id="langue-container">
                        <label class="floating-label label-yellow">langue</label>
                        <input type="text" id="langue" class="outline-input" placeholder="français">
                    </div>

                    <div class="input-container register-only" id="tel-container">
                        <label class="floating-label label-peach">numéro de téléphone</label>
                        <input type="tel" id="telephone" class="outline-input" placeholder="06-00-00-00-00">
                    </div>

                    <div class="input-container" id="email-container">
                        <label class="floating-label label-peach">email</label>
                        <input type="email" id="email" class="outline-input" placeholder="email@krew.com" required
                            autocomplete="email">
                    </div>

                    <div class="input-container" id="password-container">
                        <label class="floating-label label-yellow">mot de passe</label>
                        <input type="password" id="password" class="outline-input" placeholder="krew+123" required
                            autocomplete="current-password">
                    </div>
                </div>

                <div class="toggle-text-container">
                    <span id="toggle-msg">Pas encore de compte ?</span>
                    <span id="toggle-action" class="bold-action">Créer un compte</span>
                </div>

                <div class="submit-row">
                    <button type="submit" class="btn-gradient" id="submit-btn">connexion</button>
                </div>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>

</html>
